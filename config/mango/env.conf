# Environment — Wayland session hints
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=XDG_SESSION_DESKTOP,mango
env=QT_QPA_PLATFORM,wayland;xcb
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=MOZ_ENABLE_WAYLAND,1
env=GDK_BACKEND,wayland,x11
env=SDL_VIDEODRIVER,wayland
env=_JAVA_AWT_WM_NONREPARENTING,1
# Cursor: Bibata-Modern-Ice, matching kronos. Size 32 rather than kronos's 24
# because this panel is 2400x1600 at scale 1.5, where 24 renders noticeably
# small. XCURSOR_THEME must be set or you silently get the tiny default.
env=XCURSOR_THEME,Bibata-Modern-Ice
env=XCURSOR_SIZE,32
