# Window rules — windowrule=<property>:<value>,<matcher>:<value>,...
# Matchers: appid, title.  Common props: isfloating, width, height, tags, monitor.

# Float common dialogs / utilities
windowrule=isfloating:1,appid:pavucontrol
windowrule=isfloating:1,appid:blueman-manager
windowrule=isfloating:1,appid:nm-connection-editor
windowrule=isfloating:1,title:Open File
windowrule=isfloating:1,title:Save File
windowrule=isfloating:1,appid:org.pulseaudio.pavucontrol

# Example: pin a browser to tag 1
# windowrule=tags:1,appid:firefox

# ── Layer animations ───────────────────────────────────────────
# The launcher pops with a zoom instead of sliding.
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
