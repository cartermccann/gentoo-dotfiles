# Monitor rules — Surface Laptop Studio internal panel is eDP-1.
# Native panel is 2400x1600 @ up to 120Hz. Starting at 60Hz + scale 1.5
# (HiDPI) for a safe first boot. Once you confirm it works:
#   - bump refresh to 120 for the high-refresh panel
#   - run `wlr-randr` to see exact supported modes and adjust
monitorrule=name:eDP-1,width:2400,height:1600,refresh:60,x:0,y:0,scale:1.5,vrr:0,rr:0

# External display example (uncomment + adjust name from `wlr-randr`):
# monitorrule=name:DP-1,width:2560,height:1440,refresh:60,x:2400,y:0,scale:1,vrr:0,rr:0
