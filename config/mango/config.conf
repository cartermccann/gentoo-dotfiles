# ═══════════════════════════════════════════════════════════════
#  Mango config — atlas (Surface Laptop Studio)
#  Ported from kronos Hyprland (home/hyprland.nix) — same gaps,
#  hairline border, rounding, blur, shadow and animation curves.
# ═══════════════════════════════════════════════════════════════

# ── Effects (scenefx) ──────────────────────────────────────────
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes=4
blur_params_radius=12
blur_params_noise=0.055
blur_params_brightness=0.85
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=1
layer_shadows=1
shadow_only_floating=0  # kronos shadows every pane, not just floats
shadows_size=20
shadows_blur=15
shadows_position_x=0
shadows_position_y=4
shadowscolor=0x00000033

border_radius=14
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.95

# ── Animation (cubic-bezier .2,.8,.2,1 — no overshoot) ─────────
animations=1
layer_animations=1
# windows scale up + fade in (macOS-ish); tags/layers slide
animation_type_open=zoom
animation_type_close=zoom
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.85
zoom_end_ratio=1.0
fadein_begin_opacity=0.85
fadeout_begin_opacity=0.85
animation_duration_move=300
animation_duration_open=300
animation_duration_tag=400
animation_duration_close=180
animation_duration_focus=250
animation_curve_open=0.19,1,0.22,1
animation_curve_move=0.65,0.05,0,1
animation_curve_tag=0.77,0,0.175,1
animation_curve_close=0.5,0.5,0.75,1
animation_curve_focus=0.19,1,0.22,1
animation_curve_opafadeout=0.2,0.8,0.2,1
animation_curve_opafadein=0.2,0.8,0.2,1

# ── Scroller layout (the niri-style one) ───────────────────────
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ── Master-Stack layout ────────────────────────────────────────
new_is_master=1
smartgaps=0
default_mfact=0.55
default_nmaster=1

# ── Dwindle layout ─────────────────────────────────────────────
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=1

# ── Overview ───────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# ── Misc behaviour ─────────────────────────────────────────────
xwayland_persistence=1
syncobj_enable=1
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
circle_layout=dwindle,tile,scroller
enable_floating_snap=1
snap_distance=50
# mango draws the cursor itself and has its OWN options for it. Setting
# XCURSOR_THEME in the environment is not enough — that only reaches child
# processes (which is why ghostty and waybar picked the theme up while the
# pointer stayed the tiny default). cursor_theme must be set here.
cursor_theme=Bibata-Modern-Ice
cursor_size=32
cursor_hide_timeout=0
drag_tile_to_tile=1
single_scratchpad=1

# ── Keyboard ───────────────────────────────────────────────────
repeat_rate=40
repeat_delay=250
numlockon=1
xkb_rules_layout=us
# xkb_rules_options=ctrl:nocaps

# ── Trackpad (Surface) ─────────────────────────────────────────
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
mouse_natural_scrolling=0
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
mouse_accel_profile=1
mouse_accel_speed=0.0

# ── Appearance / gaps / borders ────────────────────────────────
gappih=6
gappiv=6
gappoh=12
gappov=12
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
# window-border colors are supplied by the active theme (source=./theme.conf below)

# ── Load sub-configs ───────────────────────────────────────────
source=./env.conf
source=./bind.conf
source=./rule.conf
source=./monitor.conf
source=./tag.conf
source=./theme.conf

# ── Autostart ──────────────────────────────────────────────────
exec-once=~/.config/mango/autostart.sh
