# ═══════════════════════════════════════════════════════════════
#  Mango config — atlas (Surface Laptop Studio)
#  Theme: Catppuccin Mocha · Motion: fast-in / soft ease-out
# ═══════════════════════════════════════════════════════════════

# ── Effects (scenefx) ──────────────────────────────────────────
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=12
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000aa

border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.96

# ── Animation (cubic-bezier .2,.8,.2,1 — no overshoot) ─────────
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.5
zoom_end_ratio=0.8
fadein_begin_opacity=0.85
fadeout_begin_opacity=0.85
animation_duration_move=350
animation_duration_open=350
animation_duration_tag=300
animation_duration_close=350
animation_duration_focus=250
animation_curve_open=0.2,0.8,0.2,1
animation_curve_move=0.2,0.8,0.2,1
animation_curve_tag=0.2,0.8,0.2,1
animation_curve_close=0.2,0.8,0.2,1
animation_curve_focus=0.2,0.8,0.2,1
animation_curve_opafadeout=0.2,0.8,0.2,1
animation_curve_opafadein=0.2,0.8,0.2,1

# ── Scroller layout (the niri-style one) ───────────────────────
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ── Master-Stack layout ────────────────────────────────────────
new_is_master=1
smartgaps=0
default_mfact=0.55
default_nmaster=1

# ── Dwindle layout ─────────────────────────────────────────────
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=1

# ── Overview ───────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# ── Misc behaviour ─────────────────────────────────────────────
xwayland_persistence=1
syncobj_enable=1
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
circle_layout=tile,scroller
enable_floating_snap=1
snap_distance=50
cursor_size=24
cursor_hide_timeout=0
drag_tile_to_tile=1
single_scratchpad=1

# ── Keyboard ───────────────────────────────────────────────────
repeat_rate=35
repeat_delay=280
numlockon=1
xkb_rules_layout=us
# xkb_rules_options=ctrl:nocaps

# ── Trackpad (Surface) ─────────────────────────────────────────
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
mouse_natural_scrolling=0
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
mouse_accel_profile=2
mouse_accel_speed=0.0

# ── Appearance / gaps / borders ────────────────────────────────
gappih=6
gappiv=6
gappoh=12
gappov=12
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=3
# Catppuccin Mocha
rootcolor=0x1e1e2eff
bordercolor=0x313244ff
focuscolor=0x89b4faff
dropcolor=0xa6e3a155
splitcolor=0xf38ba8ff
maximizescreencolor=0xf9e2afff
urgentcolor=0xf38ba8ff
scratchpadcolor=0xcba6f7ff
globalcolor=0x94e2d5ff
overlaycolor=0xa6e3a1ff

# ── Load sub-configs ───────────────────────────────────────────
source=./env.conf
source=./bind.conf
source=./rule.conf
source=./monitor.conf
source=./tag.conf

# ── Autostart ──────────────────────────────────────────────────
exec-once=~/.config/mango/autostart.sh
