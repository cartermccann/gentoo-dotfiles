# ═══════════════════════════════════════════════════════════════
#  Keybinds — SUPER-centric (Hyprland-style muscle memory)
#  syntax: bind=MODIFIER,KEY,action,params
# ═══════════════════════════════════════════════════════════════

# ── Session ────────────────────────────────────────────────────
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,q,quit
bind=SUPER,Escape,spawn,swaylock -f
bind=SUPER+SHIFT,Escape,spawn,~/.config/mango/scripts/powermenu.sh

# ── Launchers ──────────────────────────────────────────────────
bind=SUPER,Return,spawn,ghostty
bind=SUPER+SHIFT,Return,spawn,foot
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,e,spawn,thunar
bind=SUPER,w,spawn,flatpak run app.zen_browser.zen

# ── Window ─────────────────────────────────────────────────────
bind=SUPER,q,killclient,
bind=SUPER,f,togglefullscreen,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER+SHIFT,space,togglefloating,
bind=SUPER,m,zoom,
bind=SUPER,grave,toggle_scratchpad

# ── Focus (arrows + hjkl) ──────────────────────────────────────
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast

# ── Move window (exchange) ─────────────────────────────────────
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up

# ── Layouts ────────────────────────────────────────────────────
bind=SUPER,t,setlayout,tile
bind=SUPER,s,setlayout,scroller
bind=SUPER,y,setlayout,dwindle
bind=SUPER,space,switch_layout
bind=SUPER,i,incnmaster,1
bind=SUPER+SHIFT,i,incnmaster,-1

# ── Scroller controls ──────────────────────────────────────────
bind=SUPER,bracketleft,set_proportion,0.5
bind=SUPER,bracketright,switch_proportion_preset,
bind=SUPER+CTRL,Left,scroller_stack,left
bind=SUPER+CTRL,Right,scroller_stack,right
bind=SUPER+CTRL,Up,scroller_stack,up
bind=SUPER+CTRL,Down,scroller_stack,down

# ── Tags (workspaces) 1-9 ──────────────────────────────────────
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0

# ── Gaps ───────────────────────────────────────────────────────
bind=SUPER+SHIFT,equal,incgaps,1
bind=SUPER+SHIFT,minus,incgaps,-1
bind=SUPER+SHIFT,g,togglegaps

# ── Bar toggle ─────────────────────────────────────────────────
bind=SUPER,b,spawn,pkill -SIGUSR1 waybar

# ── Theme ──────────────────────────────────────────────────────
bind=SUPER+CTRL,t,spawn,atlas-theme pick
bind=SUPER+SHIFT,t,spawn,atlas-theme toggle

# ── Notifications (swaync) ─────────────────────────────────────
bind=SUPER,n,spawn,swaync-client -t -sw
bind=SUPER+SHIFT,n,spawn,swaync-client -C

# ── Dictation (Parakeet · toggle to record/stop) ───────────────
bind=SUPER+CTRL,d,spawn,~/.local/bin/toggle-dictation.sh

# ── Screenshots ────────────────────────────────────────────────
bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/screenshot.sh region
bind=none,Print,spawn,~/.config/mango/scripts/screenshot.sh full

# ── Media / brightness keys ────────────────────────────────────
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86AudioMute,spawn,~/.config/mango/scripts/volume.sh mute
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down
bind=none,XF86AudioPlay,spawn,playerctl play-pause
bind=none,XF86AudioNext,spawn,playerctl next
bind=none,XF86AudioPrev,spawn,playerctl previous

# ── Mouse ──────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ── Touchpad gestures (3/4 finger) ─────────────────────────────
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1
