# ═══════════════════════════════════════════════════════════════
#  Keybinds — ported from kronos Hyprland (home/hyprland.nix)
#  syntax: bind=MODIFIER,KEY,action,params
#
#  kronos is the single authority. Every mango default that disagreed with
#  Hyprland has been overwritten, and the mango-only aliases (SUPER+D,
#  SUPER+SHIFT+Q, SUPER+CTRL+D) are removed so there is exactly one key per
#  action -- the one your hands already know. The notable moves:
#
#    SUPER+W      was Zen browser   -> close window   (Hyprland alias for Q)
#    SUPER+T      was tile layout   -> toggle floating
#    SUPER+SPACE  was switch_layout -> app launcher
#    SUPER+TAB    was focusstack    -> next workspace
#    SUPER+F      was fullscreen    -> maximize (keeps bar/gaps)
#    SUPER+SHIFT+F                  -> true fullscreen
#    SUPER+SHIFT+E                  -> exit session (was SUPER+SHIFT+Q)
#
#  Layout controls moved off T/S/SPACE onto SUPER+CTRL+<key>, since mango
#  has real layouts and Hyprland's dwindle equivalents don't map 1:1.
#
#  Hyprland binds with no mango equivalent are listed at the bottom.
# ═══════════════════════════════════════════════════════════════

# ── Session ────────────────────────────────────────────────────
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,e,quit                                   # hyprland: exit
bind=SUPER,Escape,spawn,swaylock -f
bind=SUPER+SHIFT,Escape,spawn,~/.config/mango/scripts/powermenu.sh

# ── Launchers ──────────────────────────────────────────────────
bind=SUPER,Return,spawn,ghostty
bind=SUPER+ALT,Return,spawn,ghostty -e fish -c 'tmux attach; or tmux new -s work'
bind=SUPER,space,spawn,rofi -show drun                    # hyprland: SUPER+SPACE
bind=SUPER,v,spawn,cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind=SUPER,e,spawn,thunar
bind=SUPER+SHIFT,w,spawn,flatpak run app.zen_browser.zen  # moved: SUPER+W now closes

# ── Window ─────────────────────────────────────────────────────
bind=SUPER,q,killclient,
bind=SUPER,w,killclient,                                  # hyprland: W also closes
bind=SUPER,f,togglemaximizescreen,                        # hyprland: maximize
bind=SUPER+SHIFT,f,togglefullscreen,                      # hyprland: true fullscreen
bind=SUPER,t,togglefloating,                              # hyprland: float toggle
bind=SUPER,m,zoom,
bind=SUPER,grave,toggle_scratchpad
bind=SUPER+SHIFT,grave,toggle_scratchpad

# ── Focus (hjkl + arrows) ──────────────────────────────────────
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
bind=SUPER,u,focuslast

# ── Move window ────────────────────────────────────────────────
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right

# ── Resize (hyprland: SUPER+minus / SUPER+equal) ───────────────
bind=SUPER,minus,set_proportion,-0.05
bind=SUPER,equal,set_proportion,0.05

# ── Tags / workspaces 1-9 ──────────────────────────────────────
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
# hyprland: SUPER+TAB / SUPER+SHIFT+TAB cycle workspaces
bind=SUPER,Tab,viewtoright_have_client
bind=SUPER+SHIFT,Tab,viewtoleft_have_client
bind=SUPER,o,toggleoverview,1

# ── Layouts (moved to CTRL — T/S/SPACE are Hyprland's now) ─────
bind=SUPER+CTRL,t,setlayout,tile
bind=SUPER+CTRL,s,setlayout,scroller
bind=SUPER+CTRL,y,setlayout,dwindle
bind=SUPER+CTRL,space,switch_layout
bind=SUPER,i,incnmaster,1
bind=SUPER+SHIFT,i,incnmaster,-1

# ── Scroller controls ──────────────────────────────────────────
bind=SUPER,bracketleft,set_proportion,0.5
bind=SUPER,bracketright,switch_proportion_preset,
bind=SUPER+CTRL,Left,scroller_stack,left
bind=SUPER+CTRL,Right,scroller_stack,right
bind=SUPER+CTRL,Up,scroller_stack,up
bind=SUPER+CTRL,Down,scroller_stack,down

# ── Gaps ───────────────────────────────────────────────────────
bind=SUPER+SHIFT,equal,incgaps,1
bind=SUPER+SHIFT,minus,incgaps,-1
bind=SUPER+SHIFT,g,togglegaps

# ── Bar ────────────────────────────────────────────────────────
bind=SUPER,b,spawn,pkill -SIGUSR1 waybar

# ── Notifications (hyprland: comma / SHIFT+comma / N) ──────────
bind=SUPER,comma,spawn,swaync-client -d -sw
bind=SUPER+SHIFT,comma,spawn,swaync-client -C -sw
bind=SUPER,n,spawn,swaync-client -t -sw

# ── Screenshots (hyprland keys, grim/slurp instead of grimblast) ─
bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/screenshot.sh region
bind=SUPER+SHIFT,p,spawn,~/.config/mango/scripts/screenshot.sh copy
bind=none,Print,spawn,~/.config/mango/scripts/screenshot.sh full

# ── Theme / night light / dictation ────────────────────────────
bind=SUPER+CTRL,n,spawn,~/.config/mango/scripts/nightlight.sh   # hyprland: hypr-night-toggle
bind=SUPER+ALT,l,spawn,~/.local/bin/toggle-dictation.sh         # hyprland: SUPER+ALT+L
bind=SUPER+ALT,t,spawn,atlas-theme pick        # ALT: kronos leaves SUPER+ALT+T free
bind=SUPER+SHIFT,t,spawn,atlas-theme toggle

# ── Media / brightness keys ────────────────────────────────────
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86AudioMute,spawn,~/.config/mango/scripts/volume.sh mute
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down
bind=none,XF86AudioPlay,spawn,playerctl play-pause
bind=none,XF86AudioNext,spawn,playerctl next
bind=none,XF86AudioPrev,spawn,playerctl previous

# ── Mouse (hyprland: SUPER+LMB drag, SUPER+RMB resize) ─────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ── Touchpad gestures (3/4 finger) ─────────────────────────────
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# ── Closest-available mappings for dwindle-only Hyprland binds ─
# These have no exact mango equivalent; bound to the nearest behaviour so the
# key is not simply dead. Noted here so the difference is explicit.
bind=SUPER,c,togglefloating,        # hyprland: window.center() — mango centres floats
bind=SUPER,s,switch_layout,         # hyprland: togglesplit (dwindle-only)
bind=SUPER,p,togglefakefullscreen,  # hyprland: window.pseudo()

# ═══════════════════════════════════════════════════════════════
#  Hyprland binds with NO mango equivalent — deliberately unmapped
#  rather than silently bound to something that behaves differently:
#
#    SUPER+SHIFT+C    hyprpicker          not packaged in Gentoo
#    SUPER+period     emoji picker        was a qs-shell IPC call
#    SUPER+A          tmux submap         mango has no submap/mode system.
#                                         The tmux prefix still works INSIDE
#                                         a terminal, which is most of it.
# ═══════════════════════════════════════════════════════════════
