# Declarative service list: <service> <runlevel>
# Applied by phases/10-packages.sh. A service whose /etc/init.d/<name> is
# missing is reported, never silently skipped.
dbus            default
elogind         boot
NetworkManager  default
bluetooth       default
# ly is installed by bin/setup-ly (GURU Manifest workaround) — see README
ly              default
# sizes the greeter — see system/conf.d/consolefont. Must be in `boot` so the
# font is set before ly starts in `default`.
consolefont     boot
