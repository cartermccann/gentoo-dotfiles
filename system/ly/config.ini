# ly login manager — atlas
#
# Colours are 0xSSRRGGBB (SS = styling byte). ly does real 24-bit colour when
# full_color = true, so unlike tuigreet's 16-colour palette this can render the
# actual cobalt accent #3b6bff. 0x00000000 is the special "terminal default".

full_color = true

# ── colours ────────────────────────────────────────────────────
# bg is what gets painted behind EVERY drawn cell -- the login box interior,
# and the backing of the clock in the corner. It was pure black, which is why
# the date sat in a hard black rectangle on top of the animation. Tinting it to
# the cobalt SURFACE keeps the solid panel you liked but gives it colour, and
# the corner clock inherits the same tint instead of reading as a black hole.
bg        = 0x00171B23   # cobalt SURFACE #171b23 — dark, blue-cast, not black
fg        = 0x00FFFFFF   # white text
border_fg = 0x003B6BFF   # cobalt #3b6bff — the accent, on the box border
error_fg  = 0x00FF6B6B

# ── box / layout ───────────────────────────────────────────────
box_title      = atlas
hide_borders   = false            # keep the border: it is the cobalt accent
# blank_box FILLS the box background (upstream: "Blank main box background /
# Setting to false will make it transparent"). Back ON, because the solid panel
# read better -- but now filled with the tinted bg above rather than black, so
# it has colour instead of being a hole punched in the animation.
blank_box      = true
text_in_center = true
margin_box_h   = 4
margin_box_v   = 2
input_len      = 34
# ly has no option to move the clock -- it is hardcoded to the top-right
# corner. edge_margin is the only lever: it insets everything from the screen
# edges, so the date stops being jammed into the very corner.
edge_margin    = 2

# ── chrome ─────────────────────────────────────────────────────
# Same pairing as kronos (dotfiles/modules/desktop-niri.nix): the big clock
# carries the TIME, so the corner clock drops to the DATE. Leaving %H:%M in
# both would print the time twice on one screen.
clock               = %A, %B %d
bigclock            = en
bigclock_12hr       = false       # 24h, matching waybar and swaylock on kronos
bigclock_seconds    = false       # a ticking seconds column fights the animation
asterisk            = 0x2022      # bullet instead of *
hide_version_string = true
# These two were the black squares along the top edge: the power hints
# top-left, the numlock/capslock indicators top-right. Both are drawn as
# opaque cells over the animation and neither can be recoloured -- ly has no
# hint_fg/hint_bg, they take the global fg/bg -- so hiding is the only lever.
#
# Hiding the hints costs NOTHING functionally. They are labels only:
# shutdown_key=F1, restart_key=F2 and sleep_key=F3 stay bound whether or not
# the hint is drawn. Verified in ly 1.4.1's own config.ini, where the option
# is described as "Remove power management command hints".
hide_key_hints      = true
hide_keyboard_locks = true

# ── animation ──────────────────────────────────────────────────
# Options: none | doom | matrix | colormix | gameoflife | dur_file
#
# doom (PSX fire) and matrix (green rain) are the retro-arcade look we are
# deliberately not doing. colormix is a smooth colour-blend shader whose three
# colours are configurable, so it can run entirely in the cobalt family and
# read as a slow gradient wash rather than a screensaver.
#
# To switch: change this one line. gameoflife is the quieter alternative
# (geometric, sparse) and takes gameoflife_fg for its colour.
animation             = colormix
animation_frame_delay = 24        # higher = slower/calmer; default 5 is frantic
animation_timeout_sec = 0         # 0 = run while the greeter is up

# colormix palette — cobalt accent, deep navy, and black to sink it back
colormix_col1 = 0x003B6BFF        # cobalt #3b6bff (the accent)
colormix_col2 = 0x00102A66        # deep navy
colormix_col3 = 0x20000000        # TB_HI_BLACK — keeps the base truly black

# gameoflife alternative, if you switch to it:
gameoflife_fg = 0x003B6BFF

allow_empty_password = false
clear_password       = true
save                 = true       # remember last user + session
numlock              = false
service_name         = ly         # uses ly's own PAM file

# ── sessions ───────────────────────────────────────────────────
# Absolute, not $PREFIX_DIRECTORY — this is where mango.desktop is installed.
waylandsessions = /usr/share/wayland-sessions
xsessions       = /usr/share/xsessions
